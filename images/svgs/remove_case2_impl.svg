<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="28" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">remove_() Case 2 &#x2014; One Child</text>
  <text x="450" y="48" text-anchor="middle" fill="#777" font-size="12">Bypass the node &#x2014; return its only child so the parent adopts it</text>

  <!-- Code -->
  <rect x="30" y="66" width="420" height="130" rx="8" fill="#1e1e1e"/>
  <text x="50" y="88" fill="#6a9955" font-size="12" font-family="Consolas, monospace">// Case 2a: Only a right child</text>
  <text x="50" y="108" fill="#569cd6" font-size="12" font-family="Consolas, monospace">if <tspan fill="#d4d4d4">(!</tspan><tspan fill="#9cdcfe">node</tspan>-><tspan fill="#9cdcfe">left</tspan><tspan fill="#d4d4d4">) {</tspan></text>
  <text x="70" y="128" fill="#4ec9b0" font-size="12" font-family="Consolas, monospace">Node* <tspan fill="#9cdcfe">child</tspan> = <tspan fill="#9cdcfe">node</tspan>-><tspan fill="#9cdcfe">right</tspan>;</text>
  <text x="70" y="148" fill="#569cd6" font-size="12" font-family="Consolas, monospace">delete <tspan fill="#9cdcfe">node</tspan>;</text>
  <text x="70" y="168" fill="#569cd6" font-size="12" font-family="Consolas, monospace">return <tspan fill="#9cdcfe">child</tspan>;  <tspan fill="#6a9955">// child takes parent&#x2019;s spot</tspan></text>
  <text x="50" y="188" fill="#569cd6" font-size="12" font-family="Consolas, monospace">}</text>

  <!-- Example: right child only -->
  <text x="650" y="80" text-anchor="middle" fill="#888" font-size="12">Example: remove(30) &#x2014; has only right child</text>

  <!-- Before -->
  <text x="570" y="110" text-anchor="middle" fill="#888" font-size="11">Before:</text>
  <circle cx="570" cy="140" r="18" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="570" y="145" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">50</text>
  <line x1="556" y1="154" x2="520" y2="180" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="520" cy="198" r="18" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="520" y="203" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">30</text>
  <text x="495" y="200" fill="#e74c3c" font-size="10">del</text>
  <line x1="534" y1="212" x2="556" y2="238" stroke="#f39c12" stroke-width="2.5"/>
  <circle cx="556" cy="256" r="18" fill="#3498db" stroke="#2471a3" stroke-width="2"/>
  <text x="556" y="261" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">40</text>
  <text x="580" y="258" fill="#3498db" font-size="10">child</text>

  <!-- Arrow -->
  <text x="650" y="200" text-anchor="middle" fill="#f39c12" font-size="22">&#x2192;</text>

  <!-- After -->
  <text x="750" y="110" text-anchor="middle" fill="#888" font-size="11">After:</text>
  <circle cx="750" cy="140" r="18" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="750" y="145" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">50</text>
  <line x1="736" y1="154" x2="700" y2="180" stroke="#3498db" stroke-width="2"/>
  <circle cx="700" cy="198" r="18" fill="#3498db" stroke="#2471a3" stroke-width="2"/>
  <text x="700" y="203" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">40</text>
  <text x="700" y="224" text-anchor="middle" fill="#3498db" font-size="10">promoted</text>

  <!-- Also works for left child -->
  <rect x="30" y="220" width="420" height="80" rx="8" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>
  <text x="240" y="244" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Case 2b: Only a left child (mirror)</text>
  <rect x="50" y="256" width="380" height="34" rx="6" fill="#1e1e1e"/>
  <text x="65" y="278" fill="#569cd6" font-size="11" font-family="Consolas, monospace">if <tspan fill="#d4d4d4">(!</tspan><tspan fill="#9cdcfe">node</tspan>-><tspan fill="#9cdcfe">right</tspan><tspan fill="#d4d4d4">) {</tspan> <tspan fill="#6a9955">// same logic, return node->left</tspan></text>

  <!-- Key insight -->
  <rect x="30" y="320" width="840" height="66" rx="10" fill="#fff3e0" stroke="#f39c12" stroke-width="1.5"/>
  <text x="450" y="344" text-anchor="middle" fill="#e65100" font-size="13" font-weight="bold">Think of it like removing a link from a chain</text>
  <text x="50" y="366" fill="#555" font-size="12">The grandparent&#x2019;s pointer skips over the deleted node and connects directly to the grandchild. No data is copied &#x2014; just pointer reassignment.</text>
</svg>
