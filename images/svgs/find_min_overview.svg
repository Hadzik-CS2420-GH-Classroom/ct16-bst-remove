<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="30" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">find_min_() &#x2014; Finding the Minimum in a Subtree</text>
  <text x="450" y="52" text-anchor="middle" fill="#777" font-size="13">The minimum is always the leftmost node &#x2014; just keep walking left</text>

  <!-- Tree -->
  <circle cx="450" cy="110" r="22" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="2"/>
  <text x="450" y="115" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">50</text>

  <line x1="432" y1="128" x2="350" y2="168" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="468" y1="128" x2="550" y2="168" stroke="#bdc3c7" stroke-width="2"/>

  <circle cx="350" cy="190" r="22" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="2"/>
  <text x="350" y="195" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">30</text>

  <circle cx="550" cy="190" r="22" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="2"/>
  <text x="550" y="195" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">70</text>

  <line x1="334" y1="208" x2="280" y2="248" stroke="#27ae60" stroke-width="3"/>
  <line x1="366" y1="208" x2="420" y2="248" stroke="#bdc3c7" stroke-width="2"/>
  <line x1="534" y1="208" x2="490" y2="248" stroke="#27ae60" stroke-width="3"/>
  <line x1="566" y1="208" x2="620" y2="248" stroke="#bdc3c7" stroke-width="2"/>

  <circle cx="280" cy="270" r="22" fill="#27ae60" stroke="#1e8449" stroke-width="2.5"/>
  <text x="280" y="275" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">20</text>
  <text x="280" y="305" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">&#x2190; min of whole tree</text>

  <circle cx="420" cy="270" r="22" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="2"/>
  <text x="420" y="275" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">40</text>

  <circle cx="490" cy="270" r="22" fill="#e67e22" stroke="#d68910" stroke-width="2.5"/>
  <text x="490" y="275" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">60</text>
  <text x="490" y="305" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">&#x2190; min of right subtree</text>

  <circle cx="620" cy="270" r="22" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="2"/>
  <text x="620" y="275" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">80</text>

  <!-- Green path arrow for whole tree -->
  <text x="80" y="115" fill="#27ae60" font-size="13" font-weight="bold">find_min_(root_):</text>
  <text x="80" y="135" fill="#555" font-size="12">50 &#x2192; 30 &#x2192; 20 (no left child &#x2192; done)</text>

  <!-- Orange path for right subtree -->
  <text x="680" y="115" fill="#e67e22" font-size="13" font-weight="bold">find_min_(node&#x2192;right):</text>
  <text x="680" y="135" fill="#555" font-size="12">70 &#x2192; 60 (no left child &#x2192; done)</text>
  <text x="680" y="155" fill="#555" font-size="12" font-style="italic">Used by remove_ Case 3</text>

  <!-- Key point -->
  <rect x="80" y="170" width="150" height="50" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="155" y="192" text-anchor="middle" fill="#1a5e32" font-size="12" font-weight="bold">Always walk left</text>
  <text x="155" y="208" text-anchor="middle" fill="#555" font-size="11">O(height) time</text>
</svg>
