<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <text x="450" y="30" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">remove_() &#x2014; Three Cases at a Glance</text>
  <text x="450" y="52" text-anchor="middle" fill="#777" font-size="13">The number of children determines the removal strategy</text>

  <!-- Case 1: Leaf -->
  <rect x="20" y="72" width="270" height="290" rx="10" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <rect x="20" y="72" width="270" height="32" rx="10" fill="#27ae60"/>
  <rect x="20" y="88" width="270" height="16" fill="#27ae60"/>
  <text x="155" y="94" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Case 1: Leaf (0 children)</text>

  <text x="40" y="126" fill="#555" font-size="12" font-weight="bold">Strategy:</text>
  <text x="40" y="144" fill="#555" font-size="12">Delete the node, return nullptr</text>

  <!-- Before -->
  <text x="85" y="170" text-anchor="middle" fill="#888" font-size="11">Before:</text>
  <circle cx="85" cy="200" r="16" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="85" y="205" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">30</text>
  <line x1="73" y1="214" x2="55" y2="238" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="55" cy="252" r="16" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="55" y="257" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">20</text>
  <text x="55" y="278" text-anchor="middle" fill="#e74c3c" font-size="10">remove this</text>

  <!-- Arrow -->
  <text x="155" y="230" text-anchor="middle" fill="#27ae60" font-size="20">&#x2192;</text>

  <!-- After -->
  <text x="225" y="170" text-anchor="middle" fill="#888" font-size="11">After:</text>
  <circle cx="225" cy="200" r="16" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="225" y="205" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">30</text>
  <line x1="213" y1="214" x2="195" y2="238" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="195" y="256" text-anchor="middle" fill="#bdc3c7" font-size="10">nullptr</text>

  <text x="155" y="330" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Simplest case</text>
  <text x="155" y="348" text-anchor="middle" fill="#555" font-size="11">No children to worry about</text>

  <!-- Case 2: One Child -->
  <rect x="310" y="72" width="270" height="290" rx="10" fill="#fff" stroke="#f39c12" stroke-width="2"/>
  <rect x="310" y="72" width="270" height="32" rx="10" fill="#f39c12"/>
  <rect x="310" y="88" width="270" height="16" fill="#f39c12"/>
  <text x="445" y="94" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Case 2: One Child</text>

  <text x="330" y="126" fill="#555" font-size="12" font-weight="bold">Strategy:</text>
  <text x="330" y="144" fill="#555" font-size="12">Bypass node, return its only child</text>

  <!-- Before -->
  <text x="375" y="170" text-anchor="middle" fill="#888" font-size="11">Before:</text>
  <circle cx="375" cy="200" r="16" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="375" y="205" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">30</text>
  <text x="375" y="223" text-anchor="middle" fill="#e74c3c" font-size="10">remove this</text>
  <line x1="387" y1="214" x2="405" y2="238" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="405" cy="252" r="16" fill="#3498db" stroke="#2471a3" stroke-width="1.5"/>
  <text x="405" y="257" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">40</text>

  <!-- Arrow -->
  <text x="445" y="230" text-anchor="middle" fill="#f39c12" font-size="20">&#x2192;</text>

  <!-- After -->
  <text x="515" y="170" text-anchor="middle" fill="#888" font-size="11">After:</text>
  <circle cx="515" cy="200" r="16" fill="#3498db" stroke="#2471a3" stroke-width="1.5"/>
  <text x="515" y="205" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">40</text>
  <text x="515" y="223" text-anchor="middle" fill="#3498db" font-size="10">takes parent&#x2019;s spot</text>

  <text x="445" y="330" text-anchor="middle" fill="#f39c12" font-size="12" font-weight="bold">Child gets promoted</text>
  <text x="445" y="348" text-anchor="middle" fill="#555" font-size="11">Like removing a link in a chain</text>

  <!-- Case 3: Two Children -->
  <rect x="600" y="72" width="280" height="290" rx="10" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <rect x="600" y="72" width="280" height="32" rx="10" fill="#e74c3c"/>
  <rect x="600" y="88" width="280" height="16" fill="#e74c3c"/>
  <text x="740" y="94" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Case 3: Two Children</text>

  <text x="620" y="126" fill="#555" font-size="12" font-weight="bold">Strategy:</text>
  <text x="620" y="144" fill="#555" font-size="12">Copy in-order successor, delete it</text>

  <!-- Before -->
  <text x="670" y="170" text-anchor="middle" fill="#888" font-size="11">Before:</text>
  <circle cx="670" cy="200" r="16" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="670" y="205" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">50</text>
  <line x1="658" y1="214" x2="640" y2="238" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="682" y1="214" x2="700" y2="238" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="640" cy="252" r="14" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="640" y="257" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">30</text>
  <circle cx="700" cy="252" r="14" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="700" y="257" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">70</text>
  <line x1="694" y1="264" x2="680" y2="284" stroke="#8e44ad" stroke-width="2"/>
  <circle cx="680" cy="296" r="14" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="680" y="301" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">60</text>
  <text x="680" y="318" text-anchor="middle" fill="#8e44ad" font-size="9">successor</text>

  <!-- Arrow -->
  <text x="740" y="230" text-anchor="middle" fill="#e74c3c" font-size="20">&#x2192;</text>

  <!-- After -->
  <text x="810" y="170" text-anchor="middle" fill="#888" font-size="11">After:</text>
  <circle cx="810" cy="200" r="16" fill="#8e44ad" stroke="#6c3483" stroke-width="2"/>
  <text x="810" y="205" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">60</text>
  <text x="810" y="223" text-anchor="middle" fill="#8e44ad" font-size="10">copied here</text>
  <line x1="798" y1="214" x2="780" y2="238" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="822" y1="214" x2="840" y2="238" stroke="#bdc3c7" stroke-width="1.5"/>
  <circle cx="780" cy="252" r="14" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="780" y="257" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">30</text>
  <circle cx="840" cy="252" r="14" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <text x="840" y="257" text-anchor="middle" fill="#2c3e50" font-size="10" font-weight="bold">70</text>

  <text x="740" y="342" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">Hardest case</text>
  <text x="740" y="358" text-anchor="middle" fill="#555" font-size="11">Successor replaces, then gets deleted</text>
</svg>
